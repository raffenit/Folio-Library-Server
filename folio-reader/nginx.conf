resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Dynamic proxy endpoint - forwards requests to any URL
    location /proxy {
        # Extract target URL from query parameter
        if ($arg_url = "") {
            return 400 "Missing url parameter";
        }

        # Parse the target URL to extract components
        # Use regex to extract protocol, host, port, and path
        if ($arg_url ~ ^(https?://)([^/:]+)(:[0-9]+)?(/.*)?$) {
            set $target_proto $1;
            set $target_host $2;
            set $target_port $3;
            set $target_path $4;
        }

        # Default ports
        if ($target_port = "") {
            set $target_port ":80";
            if ($target_proto = "https://") {
                set $target_port ":443";
            }
        }

        # Default path
        if ($target_path = "") {
            set $target_path "/";
        }

        # Construct upstream
        set $upstream $target_proto$target_host$target_port$target_path$is_args$args;

        # Proxy to the target URL
        proxy_pass $upstream;
        proxy_http_version 1.1;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "*";
            add_header Content-Length 0;
            return 204;
        }

        proxy_set_header Host $target_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through auth headers
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        # Disable redirect following (let client handle)
        proxy_redirect off;

        # Error handling
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @proxy_error;
    }

    # Proxy error fallback
    location @proxy_error {
        return 502 '{"error": "Proxy failed to connect to target"}';
        add_header Content-Type application/json;
    }

    # Handle SPA routing - redirect all to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Kavita (optional - if you want to proxy through Folio)
    # location /api/kavita/ {
    #     proxy_pass http://kavita:5000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Proxy API requests to Audiobookshelf (optional)
    # location /api/abs/ {
    #     proxy_pass http://audiobookshelf:80/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
