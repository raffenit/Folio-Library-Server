services:
  folio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: folio
    ports:
      - "3001:80"  # Folio will be available on port 3001
    restart: unless-stopped
    networks:
      - media-network

  # Uncomment or copy these into your existing docker-compose if not already present:
  
  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    volumes:
      - D:/Books/manga:/Books/manga
      - D:/Books/comics:/Books/comics
      - D:/Books/ebooks:/Books/books
      - kavita-config:/kavita/config
    ports:
      - "8050:5000"
    restart: unless-stopped
    networks:
      - media-network
  
  audiobookshelf:
     image: ghcr.io/advplyr/audiobookshelf:latest
     container_name: audiobookshelf
     volumes:
       - D:/Books/audiobooks:/Books/audiobooks
       - D:/Books/podcasts:/Books/podcasts
       - audiobookshelf-config:/config
       - audiobookshelf-metadata:/metadata
     ports:
       - "81:80"
     restart: unless-stopped
     networks:
       - media-network

networks:
  media-network:
    driver: bridge

volumes:
   kavita-config:
   audiobookshelf-config:
   audiobookshelf-metadata:
