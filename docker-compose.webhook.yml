# Docker Compose - Deploy Webhook Server
# Runs a webhook endpoint (port 9000) that triggers Docker rebuilds on git push
# This is for CI/CD automation, NOT for running Folio itself
#
# For reverse proxy setup, see folio-reader/docker-compose.caddy.template.yml
#
# Usage: docker-compose -f docker-compose.webhook.yml up -d

version: '3.8'

services:
  webhook-server:
    build:
      context: ./folio-reader
      dockerfile: Dockerfile.webhook
    container_name: folio-webhook
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - DEPLOY_SECRET
      - PUBLIC_SERVER_URL
      - FOLIO_API_KEY
    volumes:
      # Mount the repo so the webhook can run git/docker commands
      # Use relative path for cross-platform compatibility
      - .:/repo
      # Mount Docker socket so it can run docker commands
      # On Windows with WSL2, this works automatically
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount data directory for profile sync
      - ./data:/data
    restart: unless-stopped
    networks:
      - media-network

networks:
  media-network:
    driver: bridge
